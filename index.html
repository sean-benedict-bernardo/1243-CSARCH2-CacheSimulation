<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache Simulator</title>
    <script src="src/Cache.js"></script>
    <script src="src/index.js"></script>
    <link rel="stylesheet" href="global.css"></link>
</head>
<body class="background">

    <div class="storage">
        Simulation:
        <div>
            <div class="paramStorage" id="programStorage">
                <h3>Program</h3>
                <textarea title="Program" name="program" id=""></textarea>
            </div>
            <div class="paramStorage" id="cacheStorage">
                <h3>Cache</h3>
                    <table id="cacheTable">
                        <tr>
                            <th>Set</th>
                            <th>Block</th>
                            <th>Data</th>
                        </tr>
                        <tr>
                            <td>0</td>
                            <td>0</td>
                            <td>0</td>
                        </tr>
                    </table>

            </div>
            <div class="paramStorage" id="sramStorage">
                <h3>SRAM</h3>
                <table id="sramTable">
                    <tr>
                        <th>Address</th>

                        <th>Data</th>
                    </tr>
                    <tr>
                        <td>0</td>
                        <td>0</td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <div class="storage">
        Settings
        <div>
            <div class="paramSettings" id="placementSettings">
                <h3>Cache</h3>
                <div id="placementTable">
                    
                    <label> 
                        Placement Policy:
                        <input type="text" title="Address" name="addresssize" id=""/>
                    </label>
                    <label> 
                        Cache Algorithm:
                        <input type="text" title="Address" name="addresssize" id=""/>
                    </label>
                    
                </div>
            </div>
            <div class="paramSettings" id="clockSettings">
                <h3>Clock</h3>
                <div id="clockTable">
                    <label>Tick Speed: <input type="text" title="Tick Speed" name="tickspeed" id=""/></label>
                    <div>
                        <button>Stop</button>
                        <button>Step Forward</button>
                        <button>Statistics</button>
                        <button>Load/Save</button>
                    </div>
                </div>
            </div>
            <div class="paramSettings" id="sizeSettings">
                <h3>Memory Size</h3>
                <div id="sizeTable">

                    <label> 
                        Address:
                        <input type="text" title="Address" name="addresssize" id=""/>
                    </label>
                    <label>
                        Word: 
                        <input type="text" title="Word" name="wordsize" id=""/>
                    </label>
                    <label>
                        Block: 
                        <input type="text" title="Block" name="blocksize" id=""/>
                    </label>
                    <label>
                        Set:
                        <input type="text" title="Set" name="setsize" id=""/>
                    </label>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
